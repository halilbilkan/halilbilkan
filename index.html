<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halil Bilkan | Portfolio</title>
    <style>
        :root {
            --bg-color: #050a15;
            --card-bg: #0d1626;
            --neon-blue: #00d4ff;
            --neon-orange: #ff9d00;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(5, 10, 21, 0.8), rgba(5, 10, 21, 0.8)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            text-align: center;
            border-bottom: 3px solid var(--neon-orange);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            text-shadow: 0 0 15px var(--neon-blue);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--neon-orange);
            font-weight: bold;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        section { margin-bottom: 60px; }

        h2 {
            border-left: 5px solid var(--neon-orange);
            padding-left: 15px;
            color: var(--neon-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border-left: 3px solid var(--neon-blue);
            margin-bottom: 20px;
        }

        h3 { margin: 0; color: var(--neon-blue); }
        .sub-text { color: var(--neon-orange); font-weight: bold; font-size: 0.9rem; }
        ul { padding-left: 20px; color: var(--text-dim); }

        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            padding: 6px 12px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .contact-box {
            border: 2px dashed var(--text-dim);
            padding: 30px;
            text-align: center;
            color: var(--text-dim);
            border-radius: 10px;
        }
